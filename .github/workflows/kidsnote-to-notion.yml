# Kidsnote → Notion mirror
#
# MANUAL EXECUTION ONLY. Kidsnote's login flow can no longer be driven by
# a headless HTTP client (the page is a Next.js SPA). So the workflow
# relies on a `sessionid` cookie the operator extracts manually from a
# logged-in browser session (Chrome F12 → Application → Cookies) and
# stores in the KIDSNOTE_SESSION_COOKIE secret. That cookie typically
# lasts ~30 days; when it expires, re-extract and re-run.
#
# Dedup: each new Notion page records the kidsnote `Report ID`. Subsequent
# runs query the DB once at startup and skip reports whose id is already
# stored, so re-running is safe and idempotent.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   KIDSNOTE_SESSION_COOKIE   value of the `sessionid` cookie for kidsnote.com
#   NOTION_TOKEN              internal integration token from notion.so/profile/integrations
#   NOTION_DATABASE_ID        32-char hex id from your Notion DB URL

name: Kidsnote → Notion mirror

on:
  workflow_dispatch:
    inputs:
      # Layout principle (2026-05-23 user feedback): default values reflect
      # the "happy path" — leave everything as-is to get the full backup
      # with AI dashboards. Operators only flip a value when they want
      # something OFF. Descriptions are Korean and explain what each
      # option does in plain language.
      limit:
        description: "최근 N개 알림장만 백업 (전체 백업이면 비워두세요. 예: 3 입력 시 최근 3개만)"
        required: false
        default: ""
      monthly_sample:
        description: "🧪 빠른 확인 모드 — 매달 알림장 1개씩만 받아서 셋업이 잘 됐는지 5분 안에 보고 싶을 때. 평소엔 off."
        required: false
        default: "off"
        type: choice
        options: ["off", "on"]
      force_refresh:
        description: "🔄 처음부터 다시 — 노션에 있는 알림장 페이지를 전부 지우고 새로 받기. AI 품질 개선 후 옛날 페이지에도 적용하고 싶을 때만. 평소엔 off."
        required: false
        default: "off"
        type: choice
        options: ["off", "on"]
      # ---- Multi-child accounts ----
      # Like the AI master toggle, the child selector now lives in repo
      # Secrets/Variables (``KIDSNOTE_CHILD_NAME``) rather than as a
      # workflow_dispatch input. Reason (2026-05-27 user feedback):
      # schedule cron events don't see ``inputs.*``, so a form-only
      # toggle silently fell back to "first child the API returns" on
      # every cron cycle. Operators with twins/siblings had to wake up
      # and re-dispatch manually each time. Single source of truth via
      # secret keeps cron and manual dispatch in sync without surprise.
      #
      # Per-fork: ``KIDSNOTE_CHILD_NAME`` = name substring (e.g. "하린").
      # Multi-child in ONE fork: also set ``KIDSNOTE_CHILD_NAME_2``,
      # ``KIDSNOTE_CHILD_NAME_3`` etc with matching session/db slots.
      # See README "자녀가 여러 명일 때" section for the recommended
      # one-fork-per-child layout (parallel runs, ~2× faster).

      # ---- AI master toggle: secret/variable AI_FEATURES (only) ----
      # The AI master toggle lives ONLY in repo Secrets/Variables now —
      # not as a workflow_dispatch input. Rationale (2026-05-27 user
      # feedback): the previous design had BOTH an ``inputs.use_ai_features``
      # toggle AND a ``vars.AI_FEATURES`` fallback for cron events.
      # Operators kept asking "which one wins? do I need to flip both?"
      # The duplication was inevitable because cron schedule events
      # don't have an ``inputs`` context — so the secret/variable was
      # the only thing the cron path could read. Rather than keep the
      # ambiguous double toggle, we drop the input and standardize on
      # the secret. Single source of truth: set/remove the secret
      # ``AI_FEATURES=on`` and that's the entire toggle.
      #
      # Advanced operators who want to skip a single AI dashboard (e.g.
      # the graduation thank-you card reads awkwardly mid-year) can add
      # the matching DISABLE secret directly:
      #   DISABLE_GROWTH_STORY=true   → skip 📖 매월 성장 스토리
      #   DISABLE_MILESTONES=true     → skip 🌟 마일스톤
      #   DISABLE_INTERESTS=true      → skip 🌱 분기별 관심사
      #   DISABLE_TEACHER_THANKS=true → skip 💌 연도별 선생님께
      # These were workflow_dispatch inputs prior to 2026-05-27 but
      # were removed at the same time as use_ai_features for the same
      # single-source-of-truth reason — the cron path never had access
      # to them anyway, so keeping them as inputs was misleading.
  # Auto-resume: a 1-year backfill can take 18-30 hours of compute,
  # but a GitHub-hosted runner caps a single job at 6 hours. Without
  # cron, the user would have to manually re-trigger after every cap.
  # With this schedule the workflow self-resumes every 4 hours; the
  # script tracks elapsed time and exits cleanly at 5h30m so the next
  # cron run can pick up via dedup. Once the backup is complete each
  # cron run finishes in ~1-2 minutes (no new alimnotas to process).
  # 2026-05-25: cron interval widened 4h → 6h. Each cycle does ~5h work
  # (publish loop + dashboards within the 6h GHA cap). At 4h interval,
  # consecutive cycles queued up and the older ones got auto-cancelled —
  # losing in-flight Notion commits and confusing operators ("backup
  # stopped at date X"). At 6h interval, each cycle has time to drain
  # before the next one fires.
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: read

concurrency:
  group: kidsnote-to-notion
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    # Long timeout: a 1-year backfill with photo-heavy reports
    # (avg 15-25 images/report + Ollama-driven LLM dashboards) ran past
    # the 6h cap on the first try, so we ask for 12h. GitHub-hosted
    # runners cap public repos at 35 hours of wall-time per workflow.
    # Re-runs after the first backfill are fast (dedup skips done).
    timeout-minutes: 720

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install fetcher deps + image helpers
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/kidsnote_fetch/requirements.txt
          # Pillow + piexif for in-memory EXIF strip + auto-compress
          # to Notion's 5 MiB per-file cap.
          pip install pillow piexif

      # ---- Ollama for body summary + LLM dashboards ----
      # Local LLM runs inside the runner — no API key / cost.
      #
      # llama3.1:8b (~4.7GB): reverted from qwen2.5:14b on 2026-05-23
      # after production runs proved 14B is too slow on the GHA CPU
      # runner — alimnota publish + 4 LLM dashboards consistently ran
      # 7-9 hours, hitting the 6h hard cap mid-dashboard and blocking
      # subsequent cron runs (concurrency was queueing then cancelling).
      # The new defensive filters (cjk + english_leak + input_copy +
      # retry-with-temperature) make 8B's quality acceptable; we trade
      # the 14B perspective wins for a backup that actually finishes.
      #
      # When ``AI_FEATURES`` secret/variable is unset or 'off', the
      # cache + pull steps below are skipped so AI-opt-out runs don't
      # pay the ~5min model-pull cost.
      # ``effective_ai`` reads the master AI toggle from repo Secrets
      # or Variables. The input has been retired — single source of
      # truth is ``AI_FEATURES`` (Secrets or Variables tab, either
      # works). cron schedule events read the same value, so manual
      # dispatch and cron stay in sync without any second toggle.
      - name: Resolve effective AI toggle
        id: ai
        env:
          REPO_VAR_AI: ${{ vars.AI_FEATURES }}
          REPO_SECRET_AI: ${{ secrets.AI_FEATURES }}
        run: |
          if [ "$REPO_VAR_AI" = "on" ] || [ "$REPO_SECRET_AI" = "on" ]; then
            echo "value=on" >> "$GITHUB_OUTPUT"
          else
            echo "value=off" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Ollama models
        id: ollama-cache
        if: ${{ steps.ai.outputs.value == 'on' }}
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-llama3.1-8b-v2

      - name: Install Ollama + pull model
        if: ${{ steps.ai.outputs.value == 'on' }}
        run: |
          if ! command -v ollama >/dev/null 2>&1; then
            curl -fsSL https://ollama.com/install.sh | sh
          fi
          # Start ollama in background
          ollama serve > /tmp/ollama.log 2>&1 &
          # Wait for ready (max 30s)
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/version >/dev/null 2>&1; then
              echo "ollama ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Pull model (cached after first run, ~5min first time)
          ollama pull llama3.1:8b

      - name: Mirror Kidsnote → Notion
        env:
          KIDSNOTE_SESSION_COOKIE: ${{ secrets.KIDSNOTE_SESSION_COOKIE }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Tell notion_mirror.py where Ollama lives + which model to use
          OLLAMA_HOST: "http://localhost:11434"
          OLLAMA_MODEL: "llama3.1:8b"
          PYTHONUNBUFFERED: "1"
          # ---- Multi-child / LLM-skip env passthrough ----
          # Master AI toggle: comes from steps.ai.outputs.value, which
          # reads the AI_FEATURES secret/variable. Same source for
          # workflow_dispatch AND cron. Per-dashboard skips: secrets/
          # variables use the positive on/off form (GROWTH_STORY=off etc)
          # to match AI_FEATURES; the workflow inverts here so the
          # downstream fetch.py keeps reading the existing DISABLE_*
          # env names. Default behavior when the secret isn't set is
          # ``on`` (= DISABLE=false) so the AI on path lights up all 4
          # dashboards out of the box.
          KIDSNOTE_CHILD_NAME: ${{ secrets.KIDSNOTE_CHILD_NAME || vars.KIDSNOTE_CHILD_NAME || '' }}
          DISABLE_ALL_LLM: ${{ steps.ai.outputs.value == 'on' && 'false' || 'true' }}
          DISABLE_GROWTH_STORY: ${{ (secrets.GROWTH_STORY || vars.GROWTH_STORY) == 'off' && 'true' || 'false' }}
          DISABLE_MILESTONES: ${{ (secrets.MILESTONES || vars.MILESTONES) == 'off' && 'true' || 'false' }}
          DISABLE_INTERESTS: ${{ (secrets.INTERESTS || vars.INTERESTS) == 'off' && 'true' || 'false' }}
          DISABLE_TEACHER_THANKS: ${{ (secrets.TEACHER_THANKS || vars.TEACHER_THANKS) == 'off' && 'true' || 'false' }}
        run: |
          set -eu
          ARGS=( "--auth-mode" "session-cookie-env" "--publish-to-notion" "--no-local-save" )
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS+=( "--limit" "${{ inputs.limit }}" )
          fi
          if [ "${{ inputs.monthly_sample }}" = "on" ]; then
            ARGS+=( "--monthly-sample" )
          fi
          if [ "${{ inputs.force_refresh }}" = "on" ]; then
            ARGS+=( "--force-refresh" )
          fi
          python tools/kidsnote_fetch/fetch.py "${ARGS[@]}"

      - name: Verify required secrets were present
        if: failure()
        env:
          KIDSNOTE_SESSION_COOKIE: ${{ secrets.KIDSNOTE_SESSION_COOKIE }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          for s in KIDSNOTE_SESSION_COOKIE NOTION_TOKEN NOTION_DATABASE_ID; do
            if [ -z "${!s:-}" ]; then
              echo "::error::repo secret '$s' is empty or unset"
            fi
          done
